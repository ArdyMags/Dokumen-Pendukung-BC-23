<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dok Pendukung BC 23</title>
<style>
    * { box-sizing: border-box; }
  body {

    padding: 0;
    margin: 0;

  body.dark-mode { background: #1a1a1a; color: #eee; }
  h1 {

 .toolbar {

    top: 0;

  body.dark-mode.toolbar {

 .toolbar button {

<body>

<h1>Dok Pendukung BC 23</h1>

<div class="toolbar no-print">
  <button onclick="tambahBaris()">+ Tambah Data</button>
  <button onclick="loadDataJSONP()">↻ Reload Data</button>
  <button onclick="toggleDark()">Toggle Dark Mode</button>
  <input type="text" id="searchBox" placeholder="Cari HBL, Party, Vessel..."
         onkeyup="filterTable()">
  <button onclick="resetFilter()">Reset</button>
  <span style="margin-left:15px">Total: <span id="jumlahData">0</span></span>
</div>

<div class="content-wrap">
<table id="tabelBC23">
  <thead>
    <tr>
      <th>No Surat</th>
      <th>No Aju</th>
      <th>Tgl Aju</th>
      <th>Mother Vessel</th>
      <th>HBL No</th>
      <th>MBL</th>
      <th>Party</th>
      <th>Jns Brg</th>
      <th>Inv/PL</th>
      <th class="no-print">Aksi</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwXm4NtKtyjTtj3zuF77VcvBxmX8IoBQiSn0HFg6h6IJ5xZXbHAbXUmAOERxfUR7qX1/exec';
let dataSpreadsheet = [];
let dataTabel = [];

function filterTable() {
  const keyword = document.getElementById('searchBox').value.toLowerCase().trim();
  const rows = document.querySelectorAll('#tbody tr');

  rows.forEach((tr, idx) => {
    const rowData = dataTabel[idx];
    if (!rowData) return;

    const textGabungan = `
      ${rowData.noSurat}
      ${rowData.noAju}
      ${rowData.tglAju}
      ${rowData.motherVessel}
      ${rowData.hblNo}
      ${rowData.mbl}
      ${rowData.party}
      ${rowData.jnsBrg}
      ${rowData.invPL}
    `.toLowerCase();

    if (textGabungan.includes(keyword)) {
      tr.classList.remove('hide');
    } else {
      tr.classList.add('hide');
    }
  });
}

function resetFilter() {
  document.getElementById('searchBox').value = '';
  document.querySelectorAll('#tbody tr').forEach(tr => tr.classList.remove('hide'));
}

window.onload = function() {
  let lastSearch = localStorage.getItem('lastSearchBC23');
  if (lastSearch) {
    document.getElementById('searchBox').value = lastSearch;
    localStorage.removeItem('lastSearchBC23');
  }

  loadDataJSONP();
}

function loadDataJSONP() {
  document.getElementById('tbody').innerHTML = '<tr><td colspan="10" style="text-align:center">Loading data...</td></tr>';

  const script = document.createElement('script');
  const callbackName = 'handleData_' + Date.now();

  window[callbackName] = function(data) {
    console.log('Data masuk:', data);

    if (!data || data.error ||!Array.isArray(data)) {
      alert('Gagal load data: ' + (data?.error || 'Data kosong'));
      dataSpreadsheet = [];
    } else {
      dataSpreadsheet = data;
    }

    dataTabel = dataSpreadsheet.map((d, i) => ({
      id: Date.now() + i,
      noSurat: d.noSurat || '',
      noAju: d.noAju || '',
      tglAju: d.tglAju? d.tglAju.split('T')[0] : '',
      motherVessel: d.motherVessel || '',
      hblNo: d.hblNo || '',
      mbl: d.mbl || '',
      party: d.party || '',
      jnsBrg: d.jnsBrg || '',
      invPL: d.invPL || '',
      isEditing: false
    }));

    renderTable();
    document.getElementById('jumlahData').textContent = dataTabel.length;

    if (document.getElementById('searchBox').value) {
      filterTable();
    }

    document.body.removeChild(script);
    delete window[callbackName];
  };

  script.src = API_URL + '?callback=' + callbackName;
  script.onerror = () => {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="10" style="text-align:center;color:red">Gagal konek ke server. Cek Apps Script.</td></tr>';
    delete window[callbackName];
  };
  document.body.appendChild(script);
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if (dataTabel.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center">Data kosong / gagal load</td></tr>';
    return;
  }

  dataTabel.forEach((row, idx) => {
    let tr = document.createElement('tr');
    const punyaNoSurat =!!row.noSurat;

    const disableNoAju = punyaNoSurat &&!row.isEditing;
    const disableTglAju = punyaNoSurat &&!row.isEditing;
    const disableJnsBrg = punyaNoSurat &&!row.isEditing;
    const disableMotherVessel =!row.isEditing;
    const disableHblNo =!row.isEditing;
    const disableMbl =!row.isEditing;
    const disableParty =!row.isEditing;
    const disableInvPL =!row.isEditing;

    tr.innerHTML = `
      <td>${row.noSurat || '-'}</td>
      <td><input type="text" value="${row.noAju}" ${disableNoAju? 'disabled' : ''}
          onchange="updateData(${idx}, 'noAju', this.value)"></td>
      <td><input type="date" value="${row.tglAju}" ${disableTglAju? 'disabled' : ''}
          onchange="updateData(${idx}, 'tglAju', this.value)"></td>
      <td><input type="text" value="${row.motherVessel}" ${disableMotherVessel? 'disabled' : ''}
          onchange="updateData(${idx}, 'motherVessel', this.value)"></td>
      <td><input type="text" value="${row.hblNo}" ${disableHblNo? 'disabled' : ''}
          onchange="updateData(${idx}, 'hblNo', this.value)"></td>
      <td><input type="text" value="${row.mbl}" ${disableMbl? 'disabled' : ''}
          onchange="updateData(${idx}, 'mbl', this.value)"></td>
      <td><input type="text" value="${row.party}" ${disableParty? 'disabled' : ''}
          onchange="updateData(${idx}, 'party', this.value)"></td>
      <td><input type="text" value="${row.jnsBrg}" ${disableJnsBrg? 'disabled' : ''}
          onchange="updateData(${idx}, 'jnsBrg', this.value)"></td>
      <td><input type="text" value="${row.invPL}" ${disableInvPL? 'disabled' : ''}
          onchange="updateData(${idx}, 'invPL', this.value)"></td>
      <td class="no-print">
        ${row.isEditing
      ? `<button class="btn-action btn-save" onclick="saveRow(${idx})">Save</button>`
         : `<button class="btn-action btn-edit" onclick="editRow(${idx})">Edit</button>`
        }
        <button class="btn-action btn-print" onclick="printRow(${idx})">Print</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function updateData(idx, field, value) {
  dataTabel[idx][field] = value;
}

function editRow(idx) {
  let keyword = document.getElementById('searchBox').value;
  if (keyword) {
    localStorage.setItem('lastSearchBC23', keyword);
  }

  dataTabel[idx].isEditing = true;
  renderTable();
  filterTable();
}

function saveRow(idx) {
  dataTabel[idx].isEditing = false;
  renderTable();
  filterTable();
  saveToSheetJSONP(idx);
}

function saveToSheetJSONP(idx) {
  const row = dataTabel[idx];
  const script = document.createElement('script');
  const callbackName = 'saveCB_' + Date.now();

  const isNewData =!row.noSurat && row.hblNo;
  const action = isNewData? 'addRow' : 'updateData';

  if (isNewData &&!row.hblNo) {
    alert('HBL No wajib diisi untuk data baru!');
    return;
  }

  document.body.style.cursor = 'wait';

  window[callbackName] = function(res) {
    document.body.style.cursor = 'default';
    if(res.success) {
      alert(isNewData? 'Data baru berhasil ditambah!' : 'Data berhasil diupdate!');
      loadDataJSONP();
    } else {
      alert('Gagal: ' + res.error);
      renderTable();
    }
    document.body.removeChild(script);
    delete window[callbackName];
  };

  const params = new URLSearchParams({
    action: action,
    hblNo: row.hblNo,
    noAju: row.noAju,
    tglAju: row.tglAju,
    motherVessel: row.motherVessel,
    mbl: row.mbl,
    party: row.party,
    jnsBrg: row.jnsBrg,
    invPL: row.invPL,
    callback: callbackName
  });

  script.src = `${API_URL}?${params.toString()}`;
  script.onerror = () => {
    document.body.style.cursor = 'default';
    alert('Gagal konek ke server');
    renderTable();
    delete window[callbackName];
  };
  document.body.appendChild(script);
}

function tambahBaris() {
  dataTabel.push({
    id: Date.now(),
    noSurat: '',
    noAju: '',
    tglAju: '',
    motherVessel: '',
    hblNo: '',
    mbl: '',
    party: '',
    jnsBrg: '',
    invPL: '',
    isEditing: true
  });
  renderTable();
  document.getElementById('jumlahData').textContent = dataTabel.length;
}

function saveNoSuratJSONP(hblNo, noSurat) {
  const script = document.createElement('script');
  const callbackName = 'saveCB_' + Date.now();
  window[callbackName] = function(res) {
    console.log('No surat saved ke Sheet:', res);
    document.body.removeChild(script);
    delete window[callbackName];
  };
  script.src = `${API_URL}?action=saveNoSurat&hblNo=${encodeURIComponent(hblNo)}&noSurat=${encodeURIComponent(noSurat)}&callback=${callbackName}`;
  document.body.appendChild(script);
}

function getRomanMonth() {
  const romawi = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
  const bulan = new Date().getMonth();
  return romawi[bulan];
}

async function printRow(idx) {
  if (dataTabel[idx].noSurat) {
    printFormatSurat(dataTabel[idx]);
    return;
  }

  document.body.style.cursor = 'wait';
  const script = document.createElement('script');
  const callbackName = 'noSuratCB_' + Date.now();

  window[callbackName] = function(res) {
    document.body.style.cursor = 'default';

    if (!res.no) {
      alert('Gagal ambil nomor surat dari server');
      return;
    }

    const tahun = new Date().getFullYear();
    const bulanRomawi = getRomanMonth();
    let noSuratBaru = `No: ${res.formatted}/${bulanRomawi}/${tahun}/FACT2/S-IMP/PANTOS`;

    dataTabel[idx].noSurat = noSuratBaru;

    saveNoSuratJSONP(dataTabel[idx].hblNo, noSuratBaru);
    renderTable();
    filterTable();

    setTimeout(() => {
      printFormatSurat(dataTabel[idx]);
    }, 300);

    document.body.removeChild(script);
    delete window[callbackName];
  };

  script.src = `${API_URL}?action=getNextNo&callback=${callbackName}`;
  script.onerror = () => {
    document.body.style.cursor = 'default';
    alert('Gagal konek ke server buat ambil nomor');
    delete window[callbackName];
  };
  document.body.appendChild(script);
}

function formatTglAju(tgl) {
  if (!tgl) return '00000000';
  let date;
  if (tgl instanceof Date) {
    date = tgl;
  } else if (typeof tgl === 'string') {
    if (tgl.includes('-')) {
      date = new Date(tgl);
    } else if (tgl.includes('/')) {
      let parts = tgl.split('/');
      date = new Date(parts[2], parts[1] - 1, parts[0]);
    } else {
      date = new Date(tgl);
    }
  } else {
    return '00000000';
  }

  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}${month}${day}`;
}
